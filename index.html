<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta (static fallback; react-helmet-async overrides per-page) -->
    <title>Eritage ENT Care | Expert Ear, Nose &amp; Throat Specialists in Uganda</title>
    <meta
      name="description"
      content="Uganda's leading ENT specialists providing expert diagnosis and treatment for ear infections, hearing loss, sinusitis, tonsillitis, and more. Over 10 years clinical experience. Book your consultation today."
    />

    <!-- Canonical — must point to the homepage root, NO www -->
    <link rel="canonical" href="https://eritageentcare.com/" />

    <!-- hreflang — Uganda English targeting -->
    <link rel="alternate" hreflang="en-UG" href="https://eritageentcare.com/" />
    <link rel="alternate" hreflang="en" href="https://eritageentcare.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eritage ENT Care | Expert ENT Specialists in Uganda" />
    <meta property="og:description" content="Uganda's trusted ENT specialists. Expert diagnosis and treatment for ear, nose, and throat conditions for adults and children nationwide." />
    <meta property="og:url" content="https://eritageentcare.com/" />
    <meta property="og:image" content="https://eritageentcare.com/eritage-logo.png" />
    <meta property="og:locale" content="en_UG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eritage ENT Care | ENT Specialists in Uganda" />
    <meta name="twitter:description" content="Uganda's trusted ENT specialists for ear, nose, and throat care." />
    <meta name="twitter:image" content="https://eritageentcare.com/eritage-logo.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Google AdSense -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1241677876393680"
      crossorigin="anonymous"
    ></script>

    <!-- Google Fonts — Playfair Display (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Organization Schema (static fallback) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalOrganization",
      "name": "Eritage ENT Care",
      "url": "https://eritageentcare.com",
      "logo": "https://eritageentcare.com/eritage-logo.png",
      "telephone": "+256740166778",
      "email": "info@eritageentcare.com",
      "medicalSpecialty": "Otolaryngology",
      "areaServed": { "@type": "Country", "name": "Uganda" },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Along Entebbe Road",
        "addressLocality": "Entebbe",
        "addressRegion": "Central Region",
        "addressCountry": "UG"
      },
      "sameAs": ["https://maps.app.goo.gl/jyV5xBRkD95u2i4B8"]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
